# nixpacks.toml

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "cd frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[phases.start]
cmd = "cd backend && npm start"

[environment]
NODE_ENV = "production"
PORT = 5000

[build]
publishDir = "frontend/build"
